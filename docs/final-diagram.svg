<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Baseline Path -->
  <text x="20" y="40" font-family="Arial" font-size="16" font-weight="bold">Baseline Path (~41µs)</text>
  
  <rect x="20" y="60" width="80" height="40" rx="5" fill="#e74c3c" />
  <text x="60" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Submit</text>
  
  <line x1="100" y1="80" x2="130" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="140" y="60" width="80" height="40" rx="5" fill="#e74c3c" />
  <text x="180" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="white">GUP/DMA</text>

  <line x1="220" y1="80" x2="250" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />

  <rect x="260" y="60" width="80" height="40" rx="5" fill="#3498db" />
  <text x="300" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="white">SRAM</text>

  <line x1="340" y1="80" x2="370" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />

  <rect x="380" y="60" width="80" height="40" rx="5" fill="#e74c3c" />
  <text x="420" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="white">IRQ</text>

  <line x1="460" y1="80" x2="490" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />

  <rect x="500" y="60" width="80" height="40" rx="5" fill="#e74c3c" />
  <text x="540" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Wakeup</text>

  <line x1="580" y1="80" x2="610" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />

  <rect x="620" y="60" width="80" height="40" rx="5" fill="#e74c3c" />
  <text x="660" y="85" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Sched</text>


  <!-- Fast Path -->
  <text x="20" y="160" font-family="Arial" font-size="16" font-weight="bold">Fast Path (~21µs)</text>
  
  <rect x="20" y="180" width="80" height="40" rx="5" fill="#2ecc71" />
  <text x="60" y="205" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Submit</text>
  
  <line x1="100" y1="200" x2="130" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="140" y="180" width="120" height="40" rx="5" fill="#3498db" />
  <text x="200" y="205" font-family="Arial" font-size="12" text-anchor="middle" fill="white">SRAM Compute</text>

  <line x1="260" y1="200" x2="290" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />

  <rect x="300" y="180" width="120" height="40" rx="5" fill="#2ecc71" />
  <text x="360" y="205" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Poll Completion</text>


  <!-- Legend -->
  <rect x="20" y="260" width="20" height="20" rx="3" fill="#e74c3c" />
  <text x="50" y="275" font-family="Arial" font-size="12">Kernel/Host Slow Path</text>
  
  <rect x="200" y="260" width="20" height="20" rx="3" fill="#3498db" />
  <text x="230" y="275" font-family="Arial" font-size="12">Deterministic Accelerator</text>

  <rect x="400" y="260" width="20" height="20" rx="3" fill="#2ecc71" />
  <text x="430" y="275" font-family="Arial" font-size="12">Optimized Path</text>
</svg>
